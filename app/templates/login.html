{% extends "base.html" %}
{% block content %}

<style>

.auth-box{
max-width:420px;
margin:auto;
padding:35px;
border-radius:12px;
background:#2b2b2b;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:fadeIn .7s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.form-control{
background:#3b3b3b;
border:1px solid #555;
color:white;
}

.form-control::placeholder{
color:#bbb;
}

.form-control:focus{
border-color:#ffc107;
box-shadow:none;
background:#3b3b3b;
color:white;
}

.btn-main{
background:#ffc107;
color:black;
font-weight:bold;
}

.btn-main:hover{
background:#ffb300;
}

</style>


<div class="auth-box">

<h3 class="text-center text-warning mb-4">
Login to WorkBridge
</h3>

<form method="POST">

<div class="mb-3">

<label class="form-label">Email</label>

<input type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>


<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<input type="password"
id="password"
name="password"
class="form-control"
placeholder="Enter password"
required>

<button type="button"
class="btn btn-secondary"
onclick="togglePassword()">

👁

</button>

</div>

</div>


<button class="btn btn-main w-100">
Login
</button>

<p class="text-center mt-3">

New user?

<a href="{{ url_for('main.register') }}" class="text-warning">
Create account
</a>

</p>

</form>

</div>


<script>

function togglePassword(){

const pass=document.getElementById("password");

pass.type=pass.type==="password"?"text":"password";

}

</script>

{% endblock %}

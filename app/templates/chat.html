{% extends "base.html" %}
{% block content %}

<h3 class="text-warning mb-4">
Project Chat
</h3>

<div class="card bg-dark text-light p-4 mb-4"
style="height:400px;overflow-y:auto">

{% for msg in messages %}

<p>

<strong>

{% if msg.sender_id == current_user.id %}

You

{% else %}

User {{ msg.sender_id }}

{% endif %}

:</strong>

{{ msg.message }}

</p>

{% endfor %}

</div>


<form method="POST">

<div class="input-group">

<input name="message"
class="form-control"
placeholder="Type message">

<button class="btn btn-warning">
Send
</button>

</div>

</form>

{% endblock %}

{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<h3 class="text-warning mb-4">
Add Portfolio Project
</h3>

<div class="card bg-dark text-light p-4 shadow">

<form method="POST" action="{{ url_for('main.add_portfolio') }}">

<label class="mb-1">Project Title</label>

<input name="title"
class="form-control mb-3"
placeholder="Example: E-commerce Website"
required>

<label class="mb-1">Project Description</label>

<textarea name="description"
class="form-control mb-3"
placeholder="Short description of your project"
rows="4"
required></textarea>

<label class="mb-1">Project URL</label>

<input name="link"
class="form-control mb-3"
placeholder="https://github.com/yourproject"
required>

<button class="btn btn-warning">

<i class="fa fa-plus"></i>
Add Portfolio

</button>

<a href="{{ url_for('main.developer_dashboard') }}"
class="btn btn-secondary ms-2">

Cancel

</a>

</form>

</div>

</div>

{% endblock %}
